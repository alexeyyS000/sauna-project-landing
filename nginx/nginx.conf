server {
    listen 80;
    server_name nginx.your-domain.com;
    client_max_body_size 11M;

    location /static/ {
        alias /app/static/;
    }
    location / {
        autoindex off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_pass http://app:8000/;
    }

}