{% load navigation %}

<style>
    footer {
        background-color: #f8f9fa;
        padding: 20px 0;
    }

    footer a {
        color: #D4A574;
        text-decoration: underline;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    footer a:hover {
        color: #FFB74D;
        text-decoration: underline;
    }
</style>

{% with phone=settings.base.NavigationSettings.phone %}
<footer class="mt-5">
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <h5>Контакты</h5>
<!--                <p>Телефон: {{phone}}</p>-->
                <p>Email: fantazia1@mail.ru</p>
            </div>
            <div class="col-md-4">
                <h5>Адрес</h5>
                <p>{{page.address}}</p>
            </div>
            <div class="col-md-4">
                <h5>Социальные сети</h5>
                <a href="#">Instagram</a><br>
                <a href="#">VK</a>
            </div>
        </div>
        <div class="text-center mt-3">
            <p>{% get_footer_text %}</p>
        </div>
    </div>
</footer>

{% endwith %}
