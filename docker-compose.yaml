version: '3.9'
services:
  app:
    restart: always
    build: .
    command: bash -c "python3 manage.py runserver --settings=sauna_landing.settings.pruduction 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      

  postgres:
    restart: always
    image: postgres:15.3-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - .env


  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - 80:80
    depends_on:
      - app
    env_file:
      - .env
  
  redis:
    restart: always
    image: redis:7.0-alpine

    
volumes:
  postgres-data:
  minio-data:
  