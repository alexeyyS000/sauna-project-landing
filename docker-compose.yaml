version: '3.9'
services:
  app:
    restart: always
    build: .
    command: bash -c "python3 manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./sauna_landing/media:/app/media

  postgres:
    restart: always
    image: postgres:15.3-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - .env

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - 80:80
    depends_on:
      - app
    env_file:
      - .env
    volumes:
      - ./sauna_landing/media:/app/media:ro

volumes:
  postgres-data:
